{% extends "base.html" %}

{% block content %}
<div class="card">
    <h1>Add Customer</h1>
    <p class="subtitle">Add a new customer and assign an area.</p>

    <form method="post" action="/add-customer">
        <label>Customer Name</label>
        <input
            type="text"
            name="new_customer_name"
            placeholder="Enter customer name"
            required
        >

        <label>Area</label>
        <select name="area">
            {% for area in areas %}
                <option value="{{ area }}">{{ area }}</option>
            {% endfor %}
        </select>

        <button type="submit">Add Customer</button>
    </form>
</div>
{% endblock %}
